<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>POSTECH Sales Cloud</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6f5; --surface:#fff; --surface-2:#f8f9f8;
  --ink:#14201a; --muted:#68716c; --line:#dde1dd; --line-soft:#eaedea;
  --nav:#0e1f16;
  --brand:#1D9E75; --brand-dark:#157a5a; --brand-soft:#e9f6f0;
  --accent:#2ECC8A; --accent-soft:#e9f6f0;
  --blue:#378ADD; --blue-soft:#ecf4fc;
  --success:#1D9E75; --success-soft:#e9f6f0;
  --warn:#96610f; --warn-soft:#faf3e6;
  --danger:#a03533; --danger-soft:#fbf0ef;
  --mono:'DM Mono',ui-monospace,monospace;
  --disp:'Syne','Noto Sans JP',sans-serif;
  --radius:8px; --radius-sm:4px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.6;font-feature-settings:"palt"}
.app{min-height:100vh;display:grid;grid-template-columns:236px 1fr}
::selection{background:#cdeede}

/* ===== sidebar ===== */
aside{background:var(--nav);background-image:linear-gradient(rgba(46,204,138,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(46,204,138,.045) 1px,transparent 1px);background-size:40px 40px;color:#fff;padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:30;border-right:1px solid #0a1710}
.logo{display:flex;align-items:center;gap:10px;margin:2px 0 18px;padding:0 8px;cursor:pointer}
.mark{width:32px;height:32px;border-radius:var(--radius-sm);background:var(--brand);border:1px solid #2bb387;display:grid;place-items:center;color:#fff;font-weight:800;font-family:var(--disp);letter-spacing:-.03em;font-size:15px;flex:none}
.logo strong{display:block;font-size:14px;line-height:1.2;font-weight:800;font-family:var(--disp);letter-spacing:.02em}
.logo span{display:flex;align-items:center;gap:5px;color:#7fa392;font-size:9px;margin-top:4px;letter-spacing:.13em;font-family:var(--mono)}
.live{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;flex:none}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.72)}}
.navgroup{font-size:9px;font-weight:500;color:#5e7a6c;letter-spacing:.16em;padding:16px 10px 5px;font-family:var(--mono)}
nav{display:grid;gap:1px}
.navitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);color:#a9bab1;font-size:12.5px;text-decoration:none;cursor:pointer;border:0;background:none;text-align:left;font-family:inherit;width:100%;position:relative}
.navitem:hover{background:rgba(255,255,255,.05);color:#e9f1ec}
.navitem.active{background:rgba(255,255,255,.08);color:#fff}
.navitem.active:before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:2px;background:var(--accent);border-radius:1px}
.navitem svg{width:16px;height:16px;flex:none;opacity:.75}
.navitem.active svg{opacity:1}
.navitem .cnt{margin-left:auto;font-size:10px;font-weight:500;color:#7d9488;font-family:var(--mono)}
.navitem.active .cnt{color:#bfe9d6}
.sidebox{margin-top:22px;border-top:1px solid rgba(255,255,255,.08);padding:14px 10px 0}
.sidebox p{margin:0;color:#8ea69a;font-size:11px;line-height:1.75}
.sidebox a{color:#5fd3a4;font-weight:600;text-decoration:none}
.sidebox a:hover{text-decoration:underline}

/* ===== main frame ===== */
main{padding:22px 30px 60px;min-width:0}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;gap:16px;flex-wrap:wrap;padding-bottom:14px;border-bottom:1px solid var(--line)}
.breadcrumb{font-size:10px;color:var(--brand);margin-bottom:7px;letter-spacing:.16em;font-family:var(--mono);display:flex;align-items:center;gap:8px}
.breadcrumb:before{content:"";width:20px;height:1.5px;background:var(--accent);flex:none}
h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.02em}
.lead{margin:5px 0 0;color:var(--muted);font-size:12px}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
button,.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 14px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;line-height:1.5}
button:hover,.btn:hover{background:#f6f8fa;border-color:#c6cdd5}
.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.primary:hover{background:var(--brand-dark);border-color:var(--brand-dark)}
.ghost-danger{color:var(--danger);border-color:#dcbdbc}
.ghost-danger:hover{background:var(--danger-soft)}
.btn-sm{padding:4px 10px;font-size:11.5px}
.btn-icon{padding:6px 8px;line-height:0}
button:disabled{opacity:.45;cursor:default}
button:focus-visible,.btn:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--brand);outline-offset:1px}

/* ===== panels ===== */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)}
.panel-head{padding:13px 18px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.panel-title{font-size:13.5px;font-weight:700;margin:0;display:flex;align-items:center;gap:8px}
.panel-title:before{content:"";width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--blue));flex:none}
.panel-note{font-size:11.5px;color:var(--muted);margin:2px 0 0}
.panel-body{padding:16px 18px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.grid-31{display:grid;grid-template-columns:minmax(0,1fr) 336px;gap:16px;align-items:start}
.stack{display:grid;gap:14px}

/* ===== metrics ===== */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:18px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.metric{padding:15px 18px 14px;cursor:pointer;border-right:1px solid var(--line-soft)}
.metric:last-child{border-right:0}
.metric:hover{background:#fafbfc}
.metric small{display:block;color:var(--muted);font-size:11px;margin-bottom:7px;letter-spacing:.03em}
.metric strong{display:block;font-size:23px;font-weight:700;letter-spacing:-.01em;font-variant-numeric:tabular-nums;line-height:1.2}
.metric strong em{font-style:normal;font-size:12px;color:var(--muted);font-weight:600;margin-left:2px}
.metric span{display:block;color:var(--muted);font-size:11px;margin-top:6px}

/* ===== badges ===== */
.badge{font-size:10.5px;font-weight:600;border:1px solid var(--line);border-radius:3px;padding:2px 7px;background:#fff;white-space:nowrap;color:#3d4b5c;display:inline-block;letter-spacing:.02em}
.badge.gold{color:#136a4d;background:var(--brand-soft);border-color:#b5e0cd}
.badge.green{color:#136a4d;background:var(--success-soft);border-color:#b5e0cd}
.badge.red{color:#8a2f2d;background:var(--danger-soft);border-color:#e2c0be}
.badge.orange{color:#7d5310;background:var(--warn-soft);border-color:#e6d2ab}
.badge.blue{color:#1d5f9e;background:var(--blue-soft);border-color:#c3daf1}
.badge.gray{color:#5b6674;background:#f2f4f6;border-color:#dde2e9}

/* ===== tables ===== */
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;font-size:10.5px;color:var(--muted);font-weight:600;padding:0 12px 7px;white-space:nowrap;letter-spacing:.05em;border-bottom:1px solid var(--line)}
.table td{border-bottom:1px solid var(--line-soft);padding:10px 12px;font-size:12.5px;vertical-align:middle}
.table td:first-child{font-weight:600}
.table tr:last-child td{border-bottom:0}
.table tr.clickable{cursor:pointer}
.table tr.clickable:hover td{background:#f6f8fa}
.table .num{text-align:right;font-variant-numeric:tabular-nums}
.table th.num{text-align:right}
.empty{border:1px dashed #ccd3db;border-radius:var(--radius);background:#fbfcfd;padding:30px;text-align:center;color:var(--muted);font-size:12.5px}
.empty strong{display:block;color:var(--ink);font-size:14px;margin-bottom:6px;font-weight:700}

/* ===== forms ===== */
label.f{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;letter-spacing:.02em}
input[type=text],input[type=number],input[type=date],input[type=tel],input[type=email],select,textarea{
  width:100%;border:1px solid var(--line);border-radius:var(--radius-sm);padding:7px 10px;font-size:12.5px;font-family:inherit;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid rgba(29,158,117,.3);outline-offset:0;border-color:var(--brand)}
textarea{resize:vertical;min-height:68px}
.frow{display:grid;gap:11px;margin-bottom:11px}
.frow.c2{grid-template-columns:1fr 1fr}
.frow.c3{grid-template-columns:1fr 1fr 1fr}
.frow.c4{grid-template-columns:repeat(4,1fr)}
.searchbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.searchbar input,.searchbar select{width:auto;min-width:148px}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{border:1px solid var(--line);border-radius:3px;padding:4px 10px;font-size:11.5px;font-weight:600;cursor:pointer;background:#fff;color:var(--muted);user-select:none}
.chip:hover{border-color:#c6cdd5;color:var(--ink)}
.chip.on{background:var(--brand);border-color:var(--brand);color:#fff}

/* ===== kanban ===== */
.kanban{display:grid;grid-template-columns:repeat(6,minmax(190px,1fr));gap:10px;overflow-x:auto;align-items:start;padding-bottom:6px}
.kcol{background:var(--surface-2);border:1px solid var(--line-soft);border-radius:6px;min-height:120px}
.kcol-h{padding:9px 12px;font-size:11.5px;font-weight:700;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line-soft)}
.kcol-h .cnt{font-size:10.5px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums}
.kcol-b{padding:8px;display:grid;gap:7px;min-height:60px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:5px;padding:10px 11px;cursor:grab;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.kcard:active{cursor:grabbing}
.kcard h4{margin:0 0 4px;font-size:12.5px;font-weight:600}
.kcard p{margin:0;font-size:11px;color:var(--muted);line-height:1.6}
.kcard .kfoot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:6px}
.kcard .kfoot b{font-size:12px;color:var(--brand-dark);font-variant-numeric:tabular-nums;font-family:var(--mono)}
.kcol.dragover{outline:2px dashed var(--brand);outline-offset:-3px}

/* ===== cards grid (creatives) ===== */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:12px}
.ccard{background:#fff;border:1px solid var(--line);border-radius:6px;overflow:hidden;cursor:pointer}
.ccard:hover{border-color:#b9c2cc}
.cthumb{height:135px;background:#eef1f4;display:grid;place-items:center;color:#9aa5b1;font-size:11px;font-weight:600;border-bottom:1px solid var(--line-soft);overflow:hidden}
.cthumb img{width:100%;height:100%;object-fit:cover}
.cbody{padding:11px 13px}
.cbody h4{margin:0 0 4px;font-size:13px;font-weight:700}
.cbody p{margin:0 0 8px;font-size:11px;color:var(--muted)}
.cvr-line{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.cvr-line b{color:var(--success);font-size:12.5px;font-variant-numeric:tabular-nums}

/* ===== charts ===== */
.chartbox{border:1px solid var(--line-soft);border-radius:6px;background:#fff;padding:12px;overflow:hidden}
.chartbox h4{margin:2px 4px 10px;font-size:12.5px;font-weight:700}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin:8px 4px 0}
.legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:-1px}

/* ===== modal ===== */
.overlay{position:fixed;inset:0;background:rgba(18,25,36,.5);display:none;place-items:center;z-index:100;padding:20px}
.overlay.show{display:grid}
.modal{background:#fff;border-radius:var(--radius);width:min(720px,100%);max-height:90vh;overflow:auto;box-shadow:0 16px 48px rgba(9,15,24,.28);border:1px solid var(--line)}
.modal.wide{width:min(980px,100%)}
.modal-h{padding:15px 20px;border-bottom:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:2}
.modal-h h2{margin:0;font-size:15px;font-weight:700}
.modal-b{padding:18px 20px}
.modal-f{padding:13px 20px 16px;border-top:1px solid var(--line-soft);display:flex;justify-content:space-between;gap:10px;position:sticky;bottom:0;background:#fff}
.modal-f .right{display:flex;gap:8px;margin-left:auto}
.x{border:0;background:none;font-size:19px;cursor:pointer;color:var(--muted);padding:4px 8px}
.x:hover{color:var(--ink);background:none}

/* ===== toast ===== */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(4px);background:#0e1f16;color:#fff;padding:9px 18px;border-radius:5px;font-size:12.5px;font-weight:600;opacity:0;pointer-events:none;transition:.2s;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== detail fields ===== */
.dfield{display:grid;grid-template-columns:118px 1fr;border-bottom:1px solid var(--line-soft);padding:8px 0;font-size:12.5px;gap:8px}
.dfield b{color:var(--muted);font-weight:600;font-size:11.5px}
.timeline{display:grid;gap:10px}
.timeitem{display:grid;grid-template-columns:76px 1fr;gap:10px;font-size:11.5px}
.timeitem b{color:var(--brand-dark);font-variant-numeric:tabular-nums;font-weight:500;font-family:var(--mono);font-size:11px}
.timeitem span{color:var(--muted);line-height:1.6}

/* ===== navi (sales knowledge) ===== */
.navi-sec{margin-bottom:8px}
.acc{border:1px solid var(--line);border-radius:6px;background:#fff;margin-bottom:8px;overflow:hidden}
.acc summary{padding:12px 16px;font-weight:700;font-size:13px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center}
.acc summary:hover{background:#fafbfc}
.acc summary::-webkit-details-marker{display:none}
.acc summary:after{content:"＋";color:var(--muted);font-weight:400}
.acc[open] summary:after{content:"－"}
.acc .acc-b{padding:0 16px 15px;font-size:12.5px;line-height:1.85;color:#333c49}
.acc .acc-b h5{margin:14px 0 5px;font-size:12px;color:var(--brand-dark);font-weight:700}
.talk{border-left:3px solid var(--brand);background:var(--brand-soft);padding:9px 13px;margin:8px 0;font-size:12px;line-height:1.8}
.talk.obj{border-color:var(--warn);background:var(--warn-soft)}
.kv{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0}
.kv th,.kv td{border:1px solid var(--line-soft);padding:6px 10px;text-align:left}
.kv th{background:var(--surface-2);font-size:10.5px;color:var(--muted);font-weight:600;letter-spacing:.03em}
.kv td.num{text-align:right;font-variant-numeric:tabular-nums}

/* ===== print document ===== */
#printRoot{display:none}
.doc{width:210mm;min-height:296mm;background:#fff;margin:0 auto 14px;padding:18mm 17mm;position:relative;box-shadow:0 6px 24px rgba(0,0,0,.16);page-break-after:always}
.doc:last-child{page-break-after:auto}
.doc .side{position:absolute;left:0;top:0;bottom:0;width:4mm;background:var(--nav)}
.doc-eyebrow{font-size:10px;letter-spacing:.26em;color:var(--brand);font-weight:500;margin-bottom:6mm;font-family:var(--mono)}
.doc h1.dt{font-size:27px;letter-spacing:.01em;margin:0 0 4mm;line-height:1.4;font-weight:700}
.doc h2.ds{font-size:15px;border-left:3px solid var(--brand);padding-left:10px;margin:10mm 0 5mm;font-weight:700}
.doc p.dl{font-size:12px;color:#444;line-height:1.9;margin:0}
.doc-meta{margin-top:12mm;font-size:12px;color:#555;line-height:2}
.doc-foot{position:absolute;bottom:12mm;left:22mm;right:17mm;display:flex;justify-content:space-between;font-size:9.5px;color:#98a2b0;letter-spacing:.04em}
.dtable{width:100%;border-collapse:collapse;font-size:12px}
.dtable th{background:#edf6f1;border:1px solid #d5e4db;padding:7px 10px;text-align:left;font-size:10.5px;color:#2c4a3d;font-weight:600;letter-spacing:.03em}
.dtable td{border:1px solid #d5e4db;padding:7px 10px}
.dtable td.num{text-align:right;font-variant-numeric:tabular-nums}
.dtable tr.total td{background:#eaf6f0;font-weight:700}
.doc-hero{background:#f1f8f4;border:1px solid #d3e6db;border-radius:4px;padding:13px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center}
.doc-hero small{display:block;font-size:9.5px;color:#5c6b7c;margin-bottom:4px;font-weight:600;letter-spacing:.05em}
.doc-hero b{font-size:19px;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.doc-note{font-size:10px;color:#777;margin-top:3mm;line-height:1.7}

#printOverlay{position:fixed;inset:0;background:#4b5057;z-index:150;display:none;overflow:auto;padding:30px 16px 70px}
#printOverlay.show{display:block}
.print-tools{position:fixed;top:0;left:0;right:0;background:#0e1f16;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:9px 22px;z-index:160}
.print-tools b{font-size:12.5px;font-weight:600}
#printOverlay .doc-wrap{margin-top:46px}

@media print{
  body>*{display:none !important}
  #printOverlay{display:block !important;position:static;background:#fff;padding:0}
  #printOverlay .print-tools{display:none !important}
  #printOverlay .doc-wrap{display:block !important;margin:0}
  .doc{box-shadow:none;margin:0;width:auto;min-height:auto}
  @page{size:A4;margin:0}
}

@media (prefers-reduced-motion:reduce){
  *{transition:none !important;animation:none !important}
}

/* ===== responsive ===== */
#menuBtn{display:none}
@media (max-width:1100px){
  .app{grid-template-columns:1fr}
  aside{position:fixed;left:-270px;width:256px;transition:left .22s;box-shadow:0 0 48px rgba(0,0,0,.35)}
  aside.open{left:0}
  #menuBtn{display:inline-block}
  main{padding:16px}
  .grid-31,.grid-2{grid-template-columns:1fr}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .metric:nth-child(-n+2){border-bottom:1px solid var(--line-soft)}
  .metric:nth-child(2n){border-right:0}
  .kanban{grid-template-columns:repeat(6,230px)}
}
@media (max-width:640px){
  .frow.c2,.frow.c3,.frow.c4{grid-template-columns:1fr}
  .topbar{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="app">
  <aside id="sidebar">
    <div class="logo" onclick="go('dashboard')">
      <div class="mark">P</div>
      <div><strong>POSTECH</strong><span><i class="live"></i>SALES CLOUD — 営業支援</span></div>
    </div>
    <nav id="mainNav"></nav>
    <div class="sidebox">
      <p>提案書・現場資料・反響データ・クリエイティブが全部入り。<br>誰が営業しても同じ水準で話せる。</p>
      <p style="margin-top:8px"><a href="https://haifudb-uhf6aprj.manus.space/" target="_blank" rel="noopener">↗ 配布台帳を開く</a></p>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <div>
        <button id="menuBtn" class="btn-sm" onclick="document.getElementById('sidebar').classList.toggle('open')">☰ メニュー</button>
        <div class="breadcrumb" id="crumb">01 — DASHBOARD</div>
        <h1 id="pageTitle">営業ダッシュボード</h1>
        <p class="lead" id="pageLead"></p>
      </div>
      <div class="actions" id="pageActions"></div>
    </div>
    <div id="view"></div>
  </main>
</div>

<!-- modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modalBox">
    <div class="modal-h"><h2 id="modalTitle"></h2><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b" id="modalBody"></div>
    <div class="modal-f" id="modalFoot"></div>
  </div>
</div>

<!-- print overlay -->
<div id="printOverlay">
  <div class="print-tools">
    <b id="printTitle">プレビュー</b>
    <div class="actions">
      <button class="btn-sm" onclick="closePrint()">閉じる</button>
      <button class="btn-sm primary" onclick="window.print()">印刷 / PDF保存</button>

/* =====================================================

   ===================================================== */
function barChart(data,opts={}){
  // data:[{label,v1,v2?}]  v1棒 v2折れ線(任意)
  const W=opts.w||620,H=opts.h||230,pad={t:16,r:18,b:30,l:46};
  const iw=W-pad.l-pad.r,ih=H-pad.t-pad.b;
  const max=Math.max(1,...data.map(d=>d.v1));
  const max2=Math.max(0.0001,...data.map(d=>d.v2||0));
  const bw=Math.min(46,iw/data.length*0.56);
  let g="";
  for(let i=0;i<4;i++){const y=pad.t+ih*i/3;g+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#edf0f3"/>`;
    g+=`<text x="${pad.l-7}" y="${y+4}" font-size="10" fill="#98a2b0" text-anchor="end">${num(Math.round(max*(3-i)/3))}</text>`}
  let line="",dots="";
  data.forEach((d,i)=>{
    const cx=pad.l+iw*(i+0.5)/data.length;
    const bh=ih*d.v1/max;
    g+=`<rect x="${cx-bw/2}" y="${pad.t+ih-bh}" width="${bw}" height="${Math.max(bh,1)}" rx="1" fill="#59bb95"/>`;
    g+=`<text x="${cx}" y="${H-9}" font-size="10.5" fill="#667085" text-anchor="middle">${esc(d.label)}</text>`;
    if(d.v2!==undefined){
      const cy=pad.t+ih-ih*(d.v2/max2);
      line+=(line?" L":"M")+cx+" "+cy;
      dots+=`<circle cx="${cx}" cy="${cy}" r="4" fill="#378ADD" stroke="#fff" stroke-width="1.5"/>`;
      dots+=`<text x="${cx}" y="${cy-9}" font-size="10" fill="#2565a8" text-anchor="middle" font-weight="700">${d.v2}</text>`;
    }
  });
  if(line)g+=`<path d="${line}" fill="none" stroke="#378ADD" stroke-width="1.5"/>`+dots;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${g}</svg>`;
}
function hBars(data,opts={}){
  // data:[{label,value,sub}] 横棒
  const max=Math.max(0.0001,...data.map(d=>d.value));
  return data.map(d=>`
   <div style="margin-bottom:11px">
     <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
       <b>${esc(d.label)}</b><span style="color:var(--muted)">${esc(d.sub)}</span></div>
     <div style="height:7px;background:#eef1f4;border-radius:1px;overflow:hidden">
       <div style="width:${Math.max(2,d.value/max*100)}%;height:100%;background:#1D9E75"></div></div>
   </div>`).join("")||`<p style="color:var(--muted);font-size:12px">データがまだありません。</p>`;
}

/* =====================================================
   顧客管理
   ===================================================== */
let custFilter={q:"",status:"",ind:""};
RENDER.customers=function(){
  setActions(`<button onclick="exportCSV('customers')">CSV出力</button><button class="primary" onclick="openCustForm()">＋ 顧客を追加</button>`);
  const list=DB.customers.filter(c=>
    (!custFilter.q||(c.name+c.contact+c.memo).toLowerCase().includes(custFilter.q.toLowerCase()))&&
    (!custFilter.status||c.status===custFilter.status)&&
    (!custFilter.ind||c.industry===custFilter.ind)
  ).sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));

  $("#view").innerHTML=`
  <section class="panel">
    <div class="panel-head">
      <div class="searchbar">
        <input type="text" placeholder="🔍 社名・担当者で検索" value="${esc(custFilter.q)}" oninput="custFilter.q=this.value;RENDER.customers()">
        <select onchange="custFilter.status=this.value;RENDER.customers()">
          <option value="">ステータス：すべて</option>${CUST_STATUS.map(s=>`<option ${custFilter.status===s?"selected":""}>${s}</option>`).join("")}</select>
        <select onchange="custFilter.ind=this.value;RENDER.customers()">
          <option value="">業種：すべて</option>${INDUSTRIES.map(s=>`<option ${custFilter.ind===s?"selected":""}>${s}</option>`).join("")}</select>
      </div>
      <span class="badge gray">${list.length}件</span>
    </div>
    <div class="panel-body">
      ${list.length?`<div style="overflow-x:auto"><table class="table">
        <thead><tr><th>顧客</th><th>業種</th><th>ステータス</th><th>担当者</th><th>主要エリア</th><th>次回アクション</th><th class="num">案件数</th></tr></thead>
        <tbody>${list.map(c=>{
          const dn=DB.deals.filter(d=>d.customerId===c.id).length;
          const next=DB.deals.filter(d=>d.customerId===c.id&&d.nextDate&&d.stage!=="報告・反響").sort((a,b)=>a.nextDate.localeCompare(b.nextDate))[0];
          return`<tr class="clickable" onclick="openCustDetail('${c.id}')">
            <td>${esc(c.name)}</td><td>${esc(c.industry||"—")}</td>
            <td><span class="badge ${CUST_COLORS[c.status]||"gray"}">${esc(c.status)}</span></td>
            <td>${esc(c.contact||"—")}</td><td>${esc((c.areas||[]).slice(0,2).join("、")||"—")}</td>
            <td>${next?fmtD(next.nextDate)+"　"+esc(next.nextAction||""):"—"}</td>
            <td class="num">${dn}</td></tr>`}).join("")}</tbody></table></div>`
      :`<div class="empty"><strong>顧客がまだ登録されていません</strong>「＋ 顧客を追加」から登録すると、案件・提案書・反響データが顧客に紐づきます。<br><br><button class="btn-sm" onclick="seedDemo()">デモデータで動きを見る</button></div>`}
    </div>
  </section>`;
};

function custFormHTML(c={}){
  return`
  <div class="frow c2">
    <div><label class="f">社名 *</label><input id="cf_name" type="text" value="${esc(c.name||"")}" placeholder="例：買取大吉 板橋店"></div>
    <div><label class="f">業種</label><select id="cf_ind">${INDUSTRIES.map(i=>`<option ${c.industry===i?"selected":""}>${i}</option>`).join("")}</select></div>
  </div>
  <div class="frow c3">
    <div><label class="f">ステータス</label><select id="cf_status">${CUST_STATUS.map(s=>`<option ${c.status===s?"selected":""}>${s}</option>`).join("")}</select></div>
    <div><label class="f">担当者</label><input id="cf_contact" type="text" value="${esc(c.contact||"")}"></div>
    <div><label class="f">電話</label><input id="cf_tel" type="tel" value="${esc(c.tel||"")}"></div>
  </div>
  <div class="frow"><label class="f">主要エリア（クリックで選択）</label>
    <div class="chips" id="cf_areas">${WARDS.map(w=>`<span class="chip ${(c.areas||[]).includes(w)?"on":""}" onclick="this.classList.toggle('on')">${w}</span>`).join("")}</div></div>
  <div class="frow"><label class="f">メモ</label><textarea id="cf_memo">${esc(c.memo||"")}</textarea></div>`;
}
function openCustForm(id){
  const c=id?DB.customers.find(x=>x.id===id):{};
  openModal(id?"顧客を編集":"顧客を追加",custFormHTML(c),`
    ${id?`<button class="ghost-danger" onclick="delCust('${id}')">削除</button>`:""}
    <div class="right"><button onclick="closeModal()">キャンセル</button>
    <button class="primary" onclick="saveCust('${id||""}')">保存する</button></div>`);
}
function saveCust(id){
  const name=$("#cf_name").value.trim();
  if(!name)return toast("社名を入力してください");
  const areas=[...document.querySelectorAll("#cf_areas .chip.on")].map(x=>x.textContent);
  const obj={name,industry:$("#cf_ind").value,status:$("#cf_status").value,contact:$("#cf_contact").value.trim(),tel:$("#cf_tel").value.trim(),areas,memo:$("#cf_memo").value.trim()};
  if(id){Object.assign(DB.customers.find(x=>x.id===id),obj);logAct(`顧客「${name}」を更新`)}
  else{DB.customers.unshift({id:uid(),createdAt:today(),...obj});logAct(`顧客「${name}」を登録`)}
  save();closeModal();RENDER[CURRENT]();toast("保存しました");
}
function delCust(id){
  const c=DB.customers.find(x=>x.id===id);
  if(!confirm(`「${c.name}」を削除しますか？\n紐づく案件・反響データも削除されます。`))return;
  const dealIds=DB.deals.filter(d=>d.customerId===id).map(d=>d.id);
  DB.deals=DB.deals.filter(d=>d.customerId!==id);
  DB.responses=DB.responses.filter(r=>!dealIds.includes(r.dealId));
  DB.customers=DB.customers.filter(x=>x.id!==id);
  logAct(`顧客「${c.name}」を削除`);save();closeModal();RENDER[CURRENT]();toast("削除しました");
}
function openCustDetail(id){
  const c=DB.customers.find(x=>x.id===id);if(!c)return;
  const deals=DB.deals.filter(d=>d.customerId===id);
  const rs=DB.responses.filter(r=>deals.some(d=>d.id===r.dealId));
  const totC=rs.reduce((s,r)=>s+ +r.copies,0),totR=rs.reduce((s,r)=>s+ +r.responses,0);
  const bench=BENCH[c.industry]||BENCH["その他"];
  openModal(c.name,`
    <div class="dfield"><b>業種</b><span>${esc(c.industry||"—")}　<span class="badge ${CUST_COLORS[c.status]}">${esc(c.status)}</span></span></div>
    <div class="dfield"><b>担当者</b><span>${esc(c.contact||"—")}　${esc(c.tel||"")}</span></div>
    <div class="dfield"><b>主要エリア</b><span>${esc((c.areas||[]).join("、")||"—")}</span></div>
    <div class="dfield"><b>累計実績</b><span>配布 ${num(totC)}部 ／ 反響 ${num(totR)}件 ／ 反響率 ${totC?pct(Math.round(totR/totC*100*1000)/1000):"—"}</span></div>
    <div class="dfield"><b>業種目安</b><span>反響率 ${bench[0]}〜${bench[1]}%　<span style="color:var(--muted);font-size:12px">${esc(bench[2])}</span></span></div>
    <div class="dfield"><b>メモ</b><span>${esc(c.memo||"—")}</span></div>
    <h4 style="margin:16px 0 8px;font-size:13px">案件（${deals.length}）</h4>
    ${deals.length?deals.map(d=>`<div class="kcard" style="margin-bottom:8px;cursor:pointer" onclick="closeModal();openDealDetail('${d.id}')">
      <div style="display:flex;justify-content:space-between"><h4>${esc(d.title)}</h4><span class="badge ${STAGE_COLORS[d.stage]}">${esc(d.stage)}</span></div>
      <p>${num(d.copies)}部 ／ ${esc((d.areas||[]).join("、"))} ／ ${yen(d.price)}</p></div>`).join("")
    :`<p style="color:var(--muted);font-size:12px">案件はまだありません。</p>`}`,`
    <button onclick="openCustForm('${id}')">編集</button>
    <div class="right">
      <button onclick="closeModal();openDealForm(null,'${id}')">＋ 案件を作成</button>
      <button class="primary" onclick="closeModal();go('proposal');setTimeout(()=>{$('#pp_cust').value='${id}';ppSyncFromCustomer()},50)">この顧客で提案書を作る</button>
    </div>`);
}

/* =====================================================
   案件管理（カンバン）
   ===================================================== */
let dealViewMode="kanban";
RENDER.deals=function(){
  setActions(`
    <button onclick="dealViewMode=dealViewMode==='kanban'?'list':'kanban';RENDER.deals()">${dealViewMode==="kanban"?"リスト表示":"カンバン表示"}</button>
    <button onclick="exportCSV('deals')">CSV出力</button>
    <button class="primary" onclick="openDealForm()">＋ 案件を追加</button>`);
  if(dealViewMode==="kanban")renderKanban();else renderDealList();
};
function dealCard(d){
  const rs=dealResponses(d.id);
  const c=rs.reduce((s,r)=>s+ +r.copies,0),r=rs.reduce((s,x)=>s+ +x.responses,0);
  return`<div class="kcard" draggable="true" ondragstart="dragDeal(event,'${d.id}')" onclick="openDealDetail('${d.id}')">
    <h4>${esc(d.title)}</h4>
    <p>${esc(cname(d.customerId))}<br>${num(d.copies)}部 ／ ${esc(d.size)} ／ ${esc((d.areas||[]).slice(0,2).join("、")||"エリア未定")}</p>
    <div class="kfoot"><b>${yen(d.price)}</b>
      ${c?`<span class="badge green">${pct(Math.round(r/c*100*1000)/1000)}</span>`
        :d.nextDate&&d.nextDate<=today()?`<span class="badge red">期日</span>`
        :d.nextDate?`<span class="badge gray">${fmtD(d.nextDate).slice(5)}</span>`:""}
    </div></div>`;
}
function renderKanban(){
  $("#view").innerHTML=`<div class="kanban">${STAGES.map(s=>{
    const items=DB.deals.filter(d=>d.stage===s);
    const sum=items.reduce((a,d)=>a+(+d.price||0),0);
    return`<div class="kcol" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="dropDeal(event,'${s}');this.classList.remove('dragover')">
      <div class="kcol-h"><span>${s}</span><span class="cnt">${items.length}件 ${sum?("／"+yen(sum)):""}</span></div>
      <div class="kcol-b">${items.map(dealCard).join("")||`<p style="color:#a5aebb;font-size:11px;text-align:center;margin:14px 0">ここにドラッグ</p>`}</div>
    </div>`}).join("")}</div>
  <p style="color:var(--muted);font-size:12px;margin-top:10px">カードをドラッグしてステージを移動。クリックで詳細・提案書・報告書へ。</p>`;
}
function renderDealList(){
  const list=[...DB.deals].sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));
  $("#view").innerHTML=`<section class="panel"><div class="panel-body">
    ${list.length?`<div style="overflow-x:auto"><table class="table">
    <thead><tr><th>案件</th><th>顧客</th><th>ステージ</th><th class="num">部数</th><th>エリア</th><th class="num">金額</th><th>配布期間</th><th>次回</th></tr></thead>
    <tbody>${list.map(d=>`<tr class="clickable" onclick="openDealDetail('${d.id}')">
      <td>${esc(d.title)}</td><td>${esc(cname(d.customerId))}</td>
      <td><span class="badge ${STAGE_COLORS[d.stage]}">${esc(d.stage)}</span></td>
      <td class="num">${num(d.copies)}</td><td>${esc((d.areas||[]).join("、")||"—")}</td>
      <td class="num">${yen(d.price)}</td><td>${fmtD(d.startDate)}〜${fmtD(d.endDate)}</td>
      <td>${d.nextDate?fmtD(d.nextDate):"—"}</td></tr>`).join("")}</tbody></table></div>`
    :`<div class="empty"><strong>案件がまだありません</strong>顧客に紐づけて案件を作ると、提案→受注→配布→報告まで一気通貫で管理できます。</div>`}
  </div></section>`;
}
let dragId=null;
function dragDeal(e,id){dragId=id;e.dataTransfer.effectAllowed="move"}
function dropDeal(e,stage){
  e.preventDefault();
  const d=deal(dragId);if(!d||d.stage===stage)return;
  d.stage=stage;logAct(`案件「${d.title}」を「${stage}」へ移動`);save();renderKanban();toast(`「${stage}」へ移動しました`);
}
function dealFormHTML(d={}){
  return`
  <div class="frow c2">
    <div><label class="f">顧客 *</label><select id="df_cust">
      <option value="">選択してください</option>
      ${DB.customers.map(c=>`<option value="${c.id}" ${d.customerId===c.id?"selected":""}>${esc(c.name)}</option>`).join("")}</select></div>
    <div><label class="f">案件名 *</label><input id="df_title" type="text" value="${esc(d.title||"")}" placeholder="例：3月新聞折込チラシ 板橋10万部"></div>
  </div>
  <div class="frow c4">
    <div><label class="f">ステージ</label><select id="df_stage">${STAGES.map(s=>`<option ${d.stage===s?"selected":""}>${s}</option>`).join("")}</select></div>
    <div><label class="f">配布部数</label><input id="df_copies" type="number" value="${d.copies||10000}" min="0" step="1000" oninput="dfPrice()"></div>
    <div><label class="f">サイズ</label><select id="df_size" onchange="dfPrice()">${SIZES.map(s=>`<option ${d.size===s?"selected":""}>${s}</option>`).join("")}</select></div>
    <div><label class="f">配布方法</label><select id="df_method" onchange="dfPrice()">${METHODS.map(s=>`<option ${d.method===s?"selected":""}>${s}</option>`).join("")}</select></div>
  </div>
  <div class="frow c3">
    <div><label class="f">金額（自動計算・手修正可）</label><input id="df_price" type="number" value="${d.price||""}" min="0"></div>
    <div><label class="f">配布開始</label><input id="df_start" type="date" value="${d.startDate||""}"></div>
    <div><label class="f">配布終了</label><input id="df_end" type="date" value="${d.endDate||""}"></div>
  </div>
  <div class="frow c2">
    <div><label class="f">次回アクション日</label><input id="df_nextd" type="date" value="${d.nextDate||""}"></div>
    <div><label class="f">次回アクション内容</label><input id="df_nexta" type="text" value="${esc(d.nextAction||"")}" placeholder="例：見積送付 / 反響報告の訪問"></div>
  </div>
  <div class="frow"><label class="f">配布エリア</label>
    <div class="chips" id="df_areas">${WARDS.map(w=>`<span class="chip ${(d.areas||[]).includes(w)?"on":""}" onclick="this.classList.toggle('on')">${w}</span>`).join("")}</div></div>
  <div class="frow"><label class="f">メモ</label><textarea id="df_memo">${esc(d.memo||"")}</textarea></div>`;
}
function dfPrice(){
  const v=calcPrice($("#df_method").value,$("#df_size").value,+$("#df_copies").value);
  $("#df_price").value=Math.round(v);
}
function openDealForm(id,presetCust){
  if(!DB.customers.length){toast("先に顧客を登録してください");go("customers");openCustForm();return}
  const d=id?deal(id):{customerId:presetCust};
  openModal(id?"案件を編集":"案件を追加",dealFormHTML(d),`
    ${id?`<button class="ghost-danger" onclick="delDeal('${id}')">削除</button>`:""}
    <div class="right"><button onclick="closeModal()">キャンセル</button>
    <button class="primary" onclick="saveDeal('${id||""}')">保存する</button></div>`,true);
  if(!id)dfPrice();
}
function saveDeal(id){
  const customerId=$("#df_cust").value,title=$("#df_title").value.trim();
  if(!customerId)return toast("顧客を選択してください");
  if(!title)return toast("案件名を入力してください");
  const areas=[...document.querySelectorAll("#df_areas .chip.on")].map(x=>x.textContent);
  const obj={customerId,title,stage:$("#df_stage").value,copies:+$("#df_copies").value||0,size:$("#df_size").value,method:$("#df_method").value,price:+$("#df_price").value||0,startDate:$("#df_start").value,endDate:$("#df_end").value,nextDate:$("#df_nextd").value,nextAction:$("#df_nexta").value.trim(),areas,memo:$("#df_memo").value.trim()};
  if(id){Object.assign(deal(id),obj);logAct(`案件「${title}」を更新`)}
  else{DB.deals.unshift({id:uid(),createdAt:today(),...obj});logAct(`案件「${title}」を作成（${cname(customerId)}）`)}
  save();closeModal();RENDER[CURRENT]();toast("保存しました");
}
function delDeal(id){
  const d=deal(id);
  if(!confirm(`「${d.title}」を削除しますか？（反響記録も削除されます）`))return;
  DB.deals=DB.deals.filter(x=>x.id!==id);
  DB.responses=DB.responses.filter(r=>r.dealId!==id);
  logAct(`案件「${d.title}」を削除`);save();closeModal();RENDER[CURRENT]();toast("削除しました");
}
function openDealDetail(id){
  const d=deal(id);if(!d)return;
  const rs=dealResponses(id).sort((a,b)=>a.date.localeCompare(b.date));
  const totC=rs.reduce((s,r)=>s+ +r.copies,0),totR=rs.reduce((s,r)=>s+ +r.responses,0);
  const cust=DB.customers.find(c=>c.id===d.customerId)||{};
  const bench=BENCH[cust.industry]||BENCH["その他"];
  const cvr=totC?totR/totC*100:0;
  openModal(d.title,`
    <div class="dfield"><b>顧客</b><span>${esc(cname(d.customerId))}（${esc(cust.industry||"—")}）</span></div>
    <div class="dfield"><b>ステージ</b><span><span class="badge ${STAGE_COLORS[d.stage]}">${esc(d.stage)}</span></span></div>
    <div class="dfield"><b>配布条件</b><span>${num(d.copies)}部 ／ ${esc(d.size)} ／ ${esc(d.method)} ／ ${esc((d.areas||[]).join("、")||"—")}</span></div>
    <div class="dfield"><b>金額</b><span>${yen(d.price)}（税別）</span></div>
    <div class="dfield"><b>配布期間</b><span>${fmtD(d.startDate)} 〜 ${fmtD(d.endDate)}</span></div>
    <div class="dfield"><b>次回</b><span>${d.nextDate?fmtD(d.nextDate)+"　"+esc(d.nextAction||""):"—"}</span></div>
    <div class="dfield"><b>実績</b><span>配布 ${num(totC)}部 ／ 反響 ${num(totR)}件 ／ 反響率 <b style="color:${cvr>=bench[0]?"var(--success)":"var(--danger)"}">${totC?pct(Math.round(cvr*1000)/1000):"—"}</b>　<span style="color:var(--muted);font-size:11.5px">業種目安 ${bench[0]}〜${bench[1]}%</span></span></div>
    <div class="dfield"><b>メモ</b><span>${esc(d.memo||"—")}</span></div>
    ${rs.length?`<h4 style="margin:14px 0 6px;font-size:13px">反響記録</h4>
      <table class="kv"><tr><th>日付</th><th>エリア</th><th>配布</th><th>反響</th><th>率</th></tr>
      ${rs.map(r=>`<tr><td>${fmtD(r.date)}</td><td>${esc(r.area)}</td><td class="num">${num(r.copies)}</td><td class="num">${num(r.responses)}</td><td class="num">${r.copies?pct(Math.round(r.responses/r.copies*100*1000)/1000):"—"}</td></tr>`).join("")}</table>`:""}
  `,`
    <button onclick="openDealForm('${id}')">編集</button>
    <div class="right">
      <button onclick="closeModal();go('responses');setTimeout(()=>{const s=$('#rf_deal');if(s)s.value='${id}'},50)">反響を記録</button>
      ${totC?`<button onclick="printReport('${id}')">反響報告書</button>`:""}
      <button class="primary" onclick="printProposalFromDeal('${id}')">提案書を出力</button>
    </div>`,true);
}

/* =====================================================
   提案書ジェネレーター
   ===================================================== */
RENDER.proposal=function(){
  setActions(`<button onclick="go('navi')">営業ナビを見る</button>`);
  $("#view").innerHTML=`
  <div class="grid-2">
    <section class="panel">
      <div class="panel-head"><div><p class="panel-title">提案条件</p><p class="panel-note">入力するとリアルタイムで見積・反響予測が更新されます。</p></div></div>
      <div class="panel-body">
        <div class="frow c2">
          <div><label class="f">顧客</label><select id="pp_cust" onchange="ppSyncFromCustomer()">
            <option value="">（未選択＝新規見込み客）</option>
            ${DB.customers.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("")}</select></div>
          <div><label class="f">宛名（顧客未登録時）</label><input id="pp_custname" type="text" placeholder="例：〇〇不動産株式会社"></div>
        </div>
        <div class="frow c2">
          <div><label class="f">業種</label><select id="pp_ind" onchange="ppCalc()">${INDUSTRIES.map(i=>`<option>${i}</option>`).join("")}</select></div>
          <div><label class="f">提案タイトル</label><input id="pp_title" type="text" placeholder="空欄なら自動生成" oninput="ppCalc()"></div>
        </div>
        <div class="frow c4">
          <div><label class="f">配布部数</label><input id="pp_copies" type="number" value="30000" step="1000" min="0" oninput="ppCalc()"></div>
          <div><label class="f">サイズ</label><select id="pp_size" onchange="ppCalc()">${SIZES.map(s=>`<option ${s==="A4"?"selected":""}>${s}</option>`).join("")}</select></div>
          <div><label class="f">配布方法</label><select id="pp_method" onchange="ppCalc()">${METHODS.map(s=>`<option>${s}</option>`).join("")}</select></div>
          <div><label class="f">配布期間(日)</label><input id="pp_days" type="number" value="14" min="1" oninput="ppCalc()"></div>

function ppSyncFromCustomer(){

    document.querySelectorAll("#pp_areas .chip").forEach(ch=>ch.classList.toggle("on",(c.areas||[]).includes(ch.textContent)));

function ppData(){
  const custId=$("#pp_cust").value;
  const cust=DB.customers.find(x=>x.id===custId);
  const areas=[...document.querySelectorAll("#pp_areas .chip.on")].map(x=>x.textContent);
  const opts=[...document.querySelectorAll("#pp_opts .chip.on")].map(x=>x.dataset.opt);
  const ind=$("#pp_ind").value,copies=+$("#pp_copies").value||0;
  const size=$("#pp_size").value,method=$("#pp_method").value,days=+$("#pp_days").value||14;
  const unit=(DB.settings.prices[method]||{})[size]||0;
  const price=unit*copies;
  const bench=BENCH[ind]||BENCH["その他"];
  return{
    custId,custName:cust?cust.name:($("#pp_custname").value.trim()||"お客様"),
    ind,copies,size,method,days,unit,price,bench,areas,opts,
    goal:$("#pp_goal").value.trim(),axis:$("#pp_axis").value.trim(),
    title:$("#pp_title").value.trim()||`${areas[0]||"東京23区"}エリア ポスティング配布のご提案`,
    lo:Math.round(copies*bench[0]/100),hi:Math.round(copies*bench[1]/100),

/* ---- 反響報告書 ---- */
function printReport(id){
  const d=deal(id);const cust=DB.customers.find(c=>c.id===d.customerId)||{};
  const rs=dealResponses(id).sort((a,b)=>a.date.localeCompare(b.date));
  const totC=rs.reduce((s,r)=>s+ +r.copies,0),totR=rs.reduce((s,r)=>s+ +r.responses,0);
  const cvr=totC?totR/totC*100:0;
  const bench=BENCH[cust.industry]||BENCH["その他"];
  const byArea={};rs.forEach(r=>{byArea[r.area]=byArea[r.area]||{c:0,r:0};byArea[r.area].c+= +r.copies;byArea[r.area].r+= +r.responses});
  const areaRows=Object.entries(byArea).sort((a,b)=>b[1].r/b[1].c-a[1].r/a[1].c);
  const best=areaRows[0];
  const s=DB.settings;
  const verdict=cvr>=bench[1]?"業種目安の上限を上回る好結果":cvr>=bench[0]?"業種目安レンジ内の標準的な結果":"業種目安をやや下回る結果";
  const advice=cvr>=bench[0]
    ?`反響の取れた${best?best[0]:"エリア"}を軸に部数を厚くし、同条件での継続配布をおすすめします。`
    :`エリアと訴求内容の見直しをおすすめします。反響率の高かった${best?best[0]:"エリア"}に絞った再配布、またはクリエイティブの訴求軸変更をご提案します。`;
  closeModal();
  openPrint("反響報告書プレビュー",`
  <div class="doc"><div class="side"></div>
    <div class="doc-eyebrow">DISTRIBUTION REPORT</div>
    <h1 class="dt" style="font-size:24px">ポスティング配布 反響報告書</h1>
    <p class="dl">${esc(cust.name||"お客様")} 御中　／　案件：${esc(d.title)}　／　報告日：${fmtD(today())}</p>

    <h2 class="ds">実施サマリー</h2>
    <div class="doc-hero">
      <div><small>配布部数</small><b>${num(totC)} 部</b></div>
      <div><small>反響数</small><b>${num(totR)} 件</b></div>
      <div><small>反響率</small><b>${pct(Math.round(cvr*1000)/1000)}</b></div>
    </div>
    <p class="doc-note">業種目安（${esc(cust.industry||"—")}）：${bench[0]}〜${bench[1]}%　→　<b>${verdict}</b></p>

    <h2 class="ds">エリア別内訳</h2>
    <table class="dtable">
      <tr><th>エリア</th><th style="width:18%">配布部数</th><th style="width:18%">反響数</th><th style="width:18%">反響率</th></tr>
      ${areaRows.map(([a,v])=>`<tr><td>${esc(a)}</td><td class="num">${num(v.c)}</td><td class="num">${num(v.r)}</td><td class="num">${v.c?pct(Math.round(v.r/v.c*100*1000)/1000):"—"}</td></tr>`).join("")}
      <tr class="total"><td>合計</td><td class="num">${num(totC)}</td><td class="num">${num(totR)}</td><td class="num">${pct(Math.round(cvr*1000)/1000)}</td></tr>
    </table>

    <h2 class="ds">明細</h2>
    <table class="dtable">
      <tr><th>配布日</th><th>エリア</th><th>配布部数</th><th>反響数</th><th>備考</th></tr>
      ${rs.map(r=>`<tr><td>${fmtD(r.date)}</td><td>${esc(r.area)}</td><td class="num">${num(r.copies)}</td><td class="num">${num(r.responses)}</td><td style="font-size:10.5px">${esc(r.memo||"")}</td></tr>`).join("")}
    </table>

    <h2 class="ds">次回に向けたご提案</h2>
    <p class="dl">${advice}</p>
    <div class="doc-foot"><span>${esc(s.company)}</span><span>1 / 1</span></div>
  </div>`);
  logAct(`反響報告書を出力（${d.title}）`);save();
}

RENDER.responses=function(){
  setActions(`<button onclick="exportCSV('responses')">CSV出力</button>`);
  const rs=[...DB.responses].sort((a,b)=>b.date.localeCompare(a.date));
  const totC=rs.reduce((s,r)=>s+ +r.copies,0),totR=rs.reduce((s,r)=>s+ +r.responses,0);

  // エリア別集計
  const byArea={};rs.forEach(r=>{byArea[r.area]=byArea[r.area]||{c:0,r:0};byArea[r.area].c+= +r.copies;byArea[r.area].r+= +r.responses});
  const areaData=Object.entries(byArea).map(([a,v])=>({label:a,value:v.c?v.r/v.c*100:0,sub:`${num(v.c)}部 / ${num(v.r)}件 / ${v.c?pct(Math.round(v.r/v.c*100*1000)/1000):"—"}`}))
    .sort((a,b)=>b.value-a.value).slice(0,10);

  // 業種別集計
  const byInd={};rs.forEach(r=>{
    const d=deal(r.dealId);const cust=d?DB.customers.find(c=>c.id===d.customerId):null;
    const ind=cust?.industry||"その他";
    byInd[ind]=byInd[ind]||{c:0,r:0};byInd[ind].c+= +r.copies;byInd[ind].r+= +r.responses});
  const indData=Object.entries(byInd).map(([a,v])=>({label:a,value:v.c?v.r/v.c*100:0,sub:v.c?pct(Math.round(v.r/v.c*100*1000)/1000):"—"}))
    .sort((a,b)=>b.value-a.value);

  const activeDeals=DB.deals.filter(d=>["受注","配布中","報告・反響"].includes(d.stage));

  $("#view").innerHTML=`
  <div class="metrics" style="grid-template-columns:repeat(3,1fr)">
    <div class="metric"><small>累計配布部数</small><strong>${num(totC)}<em>部</em></strong><span>記録 ${rs.length}件</span></div>
    <div class="metric m2"><small>累計反響数</small><strong>${num(totR)}<em>件</em></strong><span>問い合わせ・来店・QR等</span></div>
    <div class="metric m4"><small>全体反響率</small><strong>${totC?pct(Math.round(totR/totC*100*1000)/1000):"—"}</strong><span>反響 ÷ 配布部数</span></div>
  </div>
  <div class="grid-31">
    <div class="stack">
      <section class="panel">
        <div class="panel-head"><div><p class="panel-title">エリア別 反響率ランキング</p><p class="panel-note">「どこに撒くと反響が出るか」を営業トークに使う。</p></div></div>
        <div class="panel-body">${hBars(areaData)}</div>
      </section>
      <section class="panel">
        <div class="panel-head"><div><p class="panel-title">業種別 反響率</p><p class="panel-note">自社実績。提案書の説得材料になる。</p></div></div>
        <div class="panel-body">${hBars(indData)}</div>
      </section>
      <section class="panel">
        <div class="panel-head"><div><p class="panel-title">記録一覧</p></div><span class="badge gray">${rs.length}件</span></div>
        <div class="panel-body">${rs.length?`<div style="overflow-x:auto"><table class="table">
          <thead><tr><th>配布日</th><th>案件</th><th>エリア</th><th class="num">配布</th><th class="num">反響</th><th class="num">率</th><th></th></tr></thead>
          <tbody>${rs.slice(0,50).map(r=>{const d=deal(r.dealId);return`<tr>
            <td>${fmtD(r.date)}</td><td style="font-weight:400">${d?esc(d.title):"—"}</td><td>${esc(r.area)}</td>
            <td class="num">${num(r.copies)}</td><td class="num">${num(r.responses)}</td>
            <td class="num">${r.copies?pct(Math.round(r.responses/r.copies*100*1000)/1000):"—"}</td>
            <td><button class="btn-sm ghost-danger" onclick="delResp('${r.id}')">削除</button></td></tr>`}).join("")}</tbody></table></div>`
        :`<div class="empty"><strong>実績がまだありません</strong>右のフォームから配布実績と反響数を記録してください。</div>`}</div>
      </section>
    </div>
    <section class="panel">
      <div class="panel-head"><div><p class="panel-title">実績を記録</p><p class="panel-note">案件×エリア×日付で記録します。</p></div></div>
      <div class="panel-body">
        ${activeDeals.length?`
        <div class="frow"><label class="f">案件 *</label><select id="rf_deal">
          ${activeDeals.map(d=>`<option value="${d.id}">${esc(cname(d.customerId))}：${esc(d.title)}</option>`).join("")}</select></div>
        <div class="frow c2">
          <div><label class="f">配布日</label><input id="rf_date" type="date" value="${today()}"></div>
          <div><label class="f">エリア</label><select id="rf_area">${WARDS.map(w=>`<option>${w}</option>`).join("")}</select></div>
        </div>
        <div class="frow c2">
          <div><label class="f">配布部数</label><input id="rf_copies" type="number" value="5000" step="500" min="0"></div>
          <div><label class="f">反響数</label><input id="rf_resp" type="number" value="0" min="0"></div>
        </div>
        <div class="frow"><label class="f">備考</label><input id="rf_memo" type="text" placeholder="例：QRコード計測 / 電話問い合わせ"></div>
        <button class="primary" style="width:100%" onclick="saveResp()">記録する</button>
        <p style="font-size:11.5px;color:var(--muted);margin:12px 0 0;line-height:1.7">記録が貯まると、案件詳細から<b>反響報告書PDF</b>を1クリックで出せます。</p>`
        :`<div class="empty"><strong>記録できる案件がありません</strong>ステージが「受注」「配布中」「報告・反響」の案件が対象です。</div>`}
      </div>
    </section>
  </div>`;
};
function saveResp(){
  const dealId=$("#rf_deal").value;
  const copies=+$("#rf_copies").value||0,responses=+$("#rf_resp").value||0;
  if(!copies)return toast("配布部数を入力してください");
  DB.responses.unshift({id:uid(),dealId,date:$("#rf_date").value||today(),area:$("#rf_area").value,copies,responses,memo:$("#rf_memo").value.trim()});
  const d=deal(dealId);logAct(`反響記録：${d.title}（${$("#rf_area").value} ${num(copies)}部/${num(responses)}件）`);
  save();RENDER.responses();toast("記録しました");
}
function delResp(id){DB.responses=DB.responses.filter(r=>r.id!==id);save();RENDER.responses();toast("削除しました")}

function nvCalc(){
  const c=+$("#nv_c").value||0,r=+$("#nv_r").value||0,u=+$("#nv_u").value||0,p=+$("#nv_p").value||0,cv=(+$("#nv_cv").value||0)/100;
  const cost=c*p,leads=c*r/100,deals=leads*cv,rev=deals*u;
  const roi=cost?((rev-cost)/cost*100):0;
  $("#nv_out").innerHTML=`
  <div class="doc-hero" style="grid-template-columns:repeat(2,1fr);margin-top:6px">
    <div><small>配布コスト</small><b>${yen(cost)}</b></div>
    <div><small>予測反響</small><b>${(Math.round(leads*10)/10).toLocaleString()} 件</b></div>
    <div><small>予測成約 → 売上</small><b>${(Math.round(deals*10)/10).toLocaleString()}件 / ${yen(rev)}</b></div>
    <div><small>投資対効果</small><b style="color:${roi>=0?"var(--success)":"var(--danger)"}">${Math.round(roi)}%</b></div>
  </div>`;
}

/* ---------- CSV / JSON ---------- */
function dl(name,content,type){
  const b=new Blob([content],{type});const a=document.createElement("a");
  a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);
}
function csvEsc(v){v=String(v??"");return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}
function exportCSV(kind){
  let rows=[];
  if(kind==="customers"){
    rows=[["社名","業種","ステータス","担当者","電話","エリア","メモ","登録日"]];
    DB.customers.forEach(c=>rows.push([c.name,c.industry,c.status,c.contact,c.tel,(c.areas||[]).join("・"),c.memo,c.createdAt]));
  }else if(kind==="deals"){
    rows=[["案件名","顧客","ステージ","部数","サイズ","方法","金額","開始","終了","エリア","次回日","次回内容","メモ"]];
    DB.deals.forEach(d=>rows.push([d.title,cname(d.customerId),d.stage,d.copies,d.size,d.method,d.price,d.startDate,d.endDate,(d.areas||[]).join("・"),d.nextDate,d.nextAction,d.memo]));
  }else{
    rows=[["配布日","案件","顧客","エリア","配布部数","反響数","反響率(%)","備考"]];
    DB.responses.forEach(r=>{const d=deal(r.dealId);rows.push([r.date,d?d.title:"",d?cname(d.customerId):"",r.area,r.copies,r.responses,r.copies?Math.round(r.responses/r.copies*100*1000)/1000:"",r.memo])});
  }
  const csv="\uFEFF"+rows.map(r=>r.map(csvEsc).join(",")).join("\r\n");
  dl(`psc_${kind}_${today()}.csv`,csv,"text/csv");toast("CSVを書き出しました");
}
function backupJSON(){dl(`psc_backup_${today()}.json`,JSON.stringify(DB,null,1),"application/json");toast("バックアップを書き出しました")}
function restoreJSON(input){
  const f=input.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{
    const d=JSON.parse(rd.result);
    if(!d.customers||!d.deals)throw 0;
    DB=Object.assign(blank(),d);save();go("dashboard");toast("復元しました");
  }catch(e){toast("復元に失敗しました（形式が違います）")}};
  rd.readAsText(f);
}
function wipeAll(){
  if(!confirm("全データを削除します。よろしいですか？"))return;
  if(!confirm("本当に削除しますか？この操作は取り消せません。"))return;
  DB=blank();save();go("dashboard");toast("全データを削除しました");
}
